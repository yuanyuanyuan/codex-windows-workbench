name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Numeric version without the v prefix (for example 0.1.1)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Validate release source
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (git status --porcelain) { throw 'Release source must be clean.' }
          $masterCommit = (git rev-parse origin/master).Trim()
          if ($env:GITHUB_SHA -ne $masterCommit) { throw 'Release must run from the current master commit.' }
          $tagRef = git ls-remote --tags origin "refs/tags/v${{ inputs.version }}"
          if ($LASTEXITCODE -ne 0) { throw 'Unable to check whether the release tag already exists.' }
          if ($tagRef) { throw 'Release tag already exists.' }

      - name: Parse PowerShell
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem skills\stark-codex-windows-workbench\scripts -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { throw "Parser failed: $($_.FullName): $($errors[0].Message)" }
          }

      - name: Analyze PowerShell
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
          $findings = Invoke-ScriptAnalyzer -Path skills\stark-codex-windows-workbench\scripts -Recurse -Severity Warning,Error
          if ($findings) { $findings | Format-Table -AutoSize; throw 'PSScriptAnalyzer findings block release.' }

      - name: Run release policy gate
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File .\tests\release\Test-ReleaseGate.ps1 -Version '${{ inputs.version }}' -RequireEvidence

      - name: Run network UAT
        shell: pwsh
        env:
          PWSH_AI_AGENT_SKIP_WINGET_PREFLIGHT: '1'
        run: pwsh -NoLogo -NoProfile -File .\tests\uat\Invoke-UatRegression.ps1 -IncludeNetwork -Json

      - name: Create immutable tag and release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = 'v${{ inputs.version }}'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a $tag -m "stark-codex-windows-workbench $tag"
          git push origin $tag
          gh release create $tag --target $env:GITHUB_SHA --title "stark-codex-windows-workbench $tag" --generate-notes
